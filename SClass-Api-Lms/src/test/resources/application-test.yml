spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

auth:
  jwt:
    secret-key: testsecretkeytestsecretkeytestsecretkeytestsecretkey1234567890
    access-exp: 3600
    refresh-exp: 604800
  token-encryption:
    secret-key: 12345678901234567890123456789012

oauth2:
  providers:
    google:
      client-id: test-google-client-id
    kakao:
      client-id: test-kakao-client-id
      app-id: 0

cloud:
  aws:
    s3:
      bucket: test-bucket
      region: ap-northeast-2
      access-key: test-access-key
      secret-key: test-secret-key
  gcp:
    storage:
      bucket: test-bucket
      project-id: test-project-id

nicepay:
  client-key: test-client-key
  secret-key: test-secret-key
  base-url: https://sandbox-api.nicepay.co.kr
