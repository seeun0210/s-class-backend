spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/sclass}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET:sclass-supporters}
      region: ${S3_REGION:ap-northeast-2}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      endpoint: ${S3_ENDPOINT:}
  gcp:
    storage:
      bucket: ${GCS_BUCKET:sclass-supporters}
      project-id: ${GCP_PROJECT_ID:}
      credentials-location: ${GCP_CREDENTIALS_LOCATION:}
