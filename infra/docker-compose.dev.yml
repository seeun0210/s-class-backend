services:
  supporters-api:
    image: ${ECR_URL_SUPPORTERS}:latest
    container_name: supporters-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
      - CLOUDWATCH_METRICS_ENABLED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  backoffice-api:
    image: ${ECR_URL_BACKOFFICE}:latest
    container_name: backoffice-api
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080
      - CLOUDWATCH_METRICS_ENABLED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
