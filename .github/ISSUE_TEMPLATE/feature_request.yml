name: "✨ 기능 요청"
description: 새로운 기능이나 개선 사항을 제안할 때 사용해주세요
labels: ["✨ feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 간결하게 설명해주세요
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 배경 / 동기
      description: 이 기능이 왜 필요한지 설명해주세요
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 구현 방법
      description: 구현 방향이 있다면 작성해주세요
    validations:
      required: false

  - type: dropdown
    id: module
    attributes:
      label: 관련 모듈
      options:
        - SClass-Common
        - SClass-Domain
        - SClass-Infrastructure
        - SClass-Api-Supporters
        - SClass-Api-Lms
        - SClass-Api-Backoffice
        - SClass-Batch
        - 잘 모르겠음
    validations:
      required: true
