name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  type-label:
    name: Set Type Labels (branch pattern)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      skip-ci: ${{ steps.check-skip.outputs.skip-ci }}

    steps:
      - uses: TimonVS/pr-labeler-action@v5
        with:
          configuration-path: .github/pr-labels.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if CI should be skipped
        id: check-skip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip for docs branches
          if [[ "${{ github.head_ref }}" == *docs* ]]; then
            echo "skip-ci=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip when only non-code files changed (.claude/, .github/, *.md)
          files=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename')
          non_skippable=$(echo "$files" | grep -vE '^(\.claude/|\.github/|.*\.md$)' || true)
          if [ -z "$non_skippable" ]; then
            echo "skip-ci=true" >> $GITHUB_OUTPUT
          else
            echo "skip-ci=false" >> $GITHUB_OUTPUT
          fi

  module-label:
    name: Set Module Labels (changed files)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/module-labels.yml

  auto-assign:
    name: Assign PR author
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: toshimaru/auto-author-assign@v3.0.1

  ci:
    name: CI
    needs: [type-label]
    if: |
      needs.type-label.outputs.skip-ci != 'true' &&
      (github.base_ref == 'develop' || github.base_ref == 'main')
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: write

  ci-skip:
    name: CI
    needs: [type-label]
    if: needs.type-label.outputs.skip-ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report Build & Test as success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -d '{"state":"success","description":"CI skipped — no code changes","context":"Build & Test"}'
