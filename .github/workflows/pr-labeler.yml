name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  type-label:
    name: Set Type Labels (branch pattern)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      is-docs: ${{ steps.check-docs.outputs.is-docs }}

    steps:
      - uses: TimonVS/pr-labeler-action@v5
        with:
          configuration-path: .github/pr-labels.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check docs branch
        id: check-docs
        run: |
          if [[ "${{ github.head_ref }}" == *docs* ]]; then
            echo "is-docs=true" >> $GITHUB_OUTPUT
          else
            echo "is-docs=false" >> $GITHUB_OUTPUT
          fi

  module-label:
    name: Set Module Labels (changed files)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/module-labels.yml

  auto-assign:
    name: Assign PR author
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: toshimaru/auto-author-assign@v3.0.1

  ci:
    name: CI
    needs: [type-label]
    if: |
      needs.type-label.outputs.is-docs != 'true' &&
      (github.base_ref == 'develop' || github.base_ref == 'main')
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  ci-skip:
    name: Skip CI for docs
    needs: [type-label]
    if: needs.type-label.outputs.is-docs == 'true'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Report Build & Lint as success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -d '{"state":"success","description":"CI skipped for docs branch","context":"Build & Lint"}'
