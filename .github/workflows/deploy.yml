name: Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 배포 환경
        required: true
        type: choice
        options:
          - dev
          - prod
      service:
        description: 배포 대상 서비스
        required: true
        type: choice
        options:
          - supporters-api
          - backoffice-api
          - all

permissions:
  contents: read
  id-token: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build deploy matrix
        id: set-matrix
        run: |
          SERVICE="${{ inputs.service }}"

          if [[ "$SERVICE" == "all" ]]; then
            matrix='[{"service":"supporters-api","module":"SClass-Api-Supporters"},{"service":"backoffice-api","module":"SClass-Api-Backoffice"}]'
          elif [[ "$SERVICE" == "supporters-api" ]]; then
            matrix='[{"service":"supporters-api","module":"SClass-Api-Supporters"}]'
          elif [[ "$SERVICE" == "backoffice-api" ]]; then
            matrix='[{"service":"backoffice-api","module":"SClass-Api-Backoffice"}]'
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Deploy targets: $matrix"

  deploy:
    name: Deploy ${{ matrix.target.service }} (${{ inputs.environment }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.setup.outputs.matrix) }}
    environment:
      name: ${{ inputs.environment }} / ${{ matrix.target.service }}
      url: ${{ steps.deploy.outputs.service_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: sclass-${{ inputs.environment }}-${{ matrix.target.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg MODULE=${{ matrix.target.module }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ── Prod: ECS force new deployment ──
      - name: Deploy to ECS (prod)
        if: inputs.environment == 'prod'
        id: deploy-ecs
        env:
          CLUSTER: sclass-prod
          SERVICE_NAME: sclass-prod-${{ matrix.target.service }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE_NAME" \
            --force-new-deployment \
            --no-cli-pager

          echo "ECS deployment triggered for $SERVICE_NAME"
          echo "service_url=https://${{ matrix.target.service }}.sclass.click" >> "$GITHUB_OUTPUT"

      # ── Dev: EC2 docker compose via SSM ──
      - name: Deploy to EC2 (dev)
        if: inputs.environment == 'dev'
        id: deploy-ec2
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=sclass-dev-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::Dev EC2 instance not found"
            exit 1
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"cd /home/ec2-user && docker compose pull && docker compose up -d\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            2>/dev/null || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command failed with status: $STATUS"
            exit 1
          fi

          echo "Dev deployment completed via SSM"
          echo "service_url=https://${{ matrix.target.service }}.dev.sclass.click" >> "$GITHUB_OUTPUT"

      - name: Set deploy output
        id: deploy
        run: |
          if [ -n "${{ steps.deploy-ecs.outputs.service_url }}" ]; then
            echo "service_url=${{ steps.deploy-ecs.outputs.service_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "service_url=${{ steps.deploy-ec2.outputs.service_url }}" >> "$GITHUB_OUTPUT"
          fi
