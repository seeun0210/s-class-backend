name: CI

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint Check
        run: ./gradlew ktlintCheck

      - name: Build
        run: ./gradlew clean build
