name: Infrastructure

on:
  push:
    branches: [develop, main]
    paths:
      - 'infra/env/**'
      - 'infra/shared/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

jobs:
  terraform-dev:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    environment: dev
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    defaults:
      run:
        working-directory: infra/env

    env:
      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_token_encryption_key: ${{ secrets.TF_VAR_TOKEN_ENCRYPTION_KEY }}
      TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
      TF_VAR_kakao_client_id: ${{ secrets.TF_VAR_KAKAO_CLIENT_ID }}
      TF_VAR_kakao_app_id: ${{ secrets.TF_VAR_KAKAO_APP_ID }}
      TF_VAR_smtp_username: ${{ secrets.TF_VAR_SMTP_USERNAME }}
      TF_VAR_smtp_password: ${{ secrets.TF_VAR_SMTP_PASSWORD }}
      TF_VAR_alimtalk_access_key: ${{ secrets.TF_VAR_ALIMTALK_ACCESS_KEY }}
      TF_VAR_alimtalk_service_id: ${{ secrets.TF_VAR_ALIMTALK_SERVICE_ID }}
      TF_VAR_alimtalk_secret_key: ${{ secrets.TF_VAR_ALIMTALK_SECRET_KEY }}
      TF_VAR_nicepay_client_key: ${{ secrets.TF_VAR_NICEPAY_CLIENT_KEY }}
      TF_VAR_nicepay_secret_key: ${{ secrets.TF_VAR_NICEPAY_SECRET_KEY }}
      TF_VAR_redis_host: ${{ secrets.TF_VAR_redis_host }}
      TF_VAR_redis_port: ${{ secrets.TF_VAR_redis_port }}
      TF_VAR_redis_password: ${{ secrets.TF_VAR_redis_password }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config="key=sclass/dev/terraform.tfstate"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=envs/dev.tfvars

  terraform-prod:
    name: Terraform Apply (prod)
    runs-on: ubuntu-latest
    environment: prod
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    defaults:
      run:
        working-directory: infra/env

    env:
      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_token_encryption_key: ${{ secrets.TF_VAR_TOKEN_ENCRYPTION_KEY }}
      TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
      TF_VAR_kakao_client_id: ${{ secrets.TF_VAR_KAKAO_CLIENT_ID }}
      TF_VAR_kakao_app_id: ${{ secrets.TF_VAR_KAKAO_APP_ID }}
      TF_VAR_smtp_username: ${{ secrets.TF_VAR_SMTP_USERNAME }}
      TF_VAR_smtp_password: ${{ secrets.TF_VAR_SMTP_PASSWORD }}
      TF_VAR_alimtalk_access_key: ${{ secrets.TF_VAR_ALIMTALK_ACCESS_KEY }}
      TF_VAR_alimtalk_service_id: ${{ secrets.TF_VAR_ALIMTALK_SERVICE_ID }}
      TF_VAR_alimtalk_secret_key: ${{ secrets.TF_VAR_ALIMTALK_SECRET_KEY }}
      TF_VAR_nicepay_client_key: ${{ secrets.TF_VAR_NICEPAY_CLIENT_KEY }}
      TF_VAR_nicepay_secret_key: ${{ secrets.TF_VAR_NICEPAY_SECRET_KEY }}
      TF_VAR_redis_host: ${{ secrets.TF_VAR_redis_host }}
      TF_VAR_redis_port: ${{ secrets.TF_VAR_redis_port }}
      TF_VAR_redis_password: ${{ secrets.TF_VAR_redis_password }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config="key=sclass/prod/terraform.tfstate"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars
