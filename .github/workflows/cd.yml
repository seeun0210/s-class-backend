name: CD

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Deploy target (supporters / lms / backoffice / all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - supporters
          - lms
          - backoffice

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release merge
        id: release
        run: |
          COMMIT_MSG=$(git log -1 --format='%s')
          if [[ "$COMMIT_MSG" =~ ^Merge\ (branch\ \'release/|tag\ \') ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch' && steps.release.outputs.is_release != 'true'
        id: filter
        with:
          filters: |
            common:
              - 'SClass-Common/**'
              - 'SClass-Domain/**'
              - 'SClass-Infrastructure/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'Dockerfile'
            supporters:
              - 'SClass-Api-Supporters/**'
            lms:
              - 'SClass-Api-Lms/**'
            backoffice:
              - 'SClass-Api-Backoffice/**'

      - name: Build deploy matrix
        id: set-matrix
        run: |
          ALL='[{"service":"supporters-api","module":"SClass-Api-Supporters"},{"service":"lms-api","module":"SClass-Api-Lms"},{"service":"backoffice-api","module":"SClass-Api-Backoffice"}]'

          # workflow_dispatch → 입력값으로 결정
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.service }}" in
              all)        matrix="$ALL" ;;
              supporters) matrix='[{"service":"supporters-api","module":"SClass-Api-Supporters"}]' ;;
              lms)        matrix='[{"service":"lms-api","module":"SClass-Api-Lms"}]' ;;
              backoffice) matrix='[{"service":"backoffice-api","module":"SClass-Api-Backoffice"}]' ;;
            esac
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying: $matrix"
            exit 0
          fi

          # release 머지 → 전체 서비스 배포
          if [[ "${{ steps.release.outputs.is_release }}" == "true" ]]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
            echo "Release merge detected — deploying all services: $ALL"
            exit 0
          fi

          matrix='[]'

          if [[ "${{ steps.filter.outputs.common }}" == "true" || "${{ steps.filter.outputs.supporters }}" == "true" ]]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "supporters-api", "module": "SClass-Api-Supporters"}]')
          fi

          if [[ "${{ steps.filter.outputs.common }}" == "true" || "${{ steps.filter.outputs.lms }}" == "true" ]]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "lms-api", "module": "SClass-Api-Lms"}]')
          fi

          if [[ "${{ steps.filter.outputs.common }}" == "true" || "${{ steps.filter.outputs.backoffice }}" == "true" ]]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "backoffice-api", "module": "SClass-Api-Backoffice"}]')
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Deploy targets: $matrix"

  ci:
    name: CI
    needs: changes
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy ${{ matrix.target.service }} (${{ needs.setup.outputs.env }})
    needs: [setup, changes, ci]
    if: needs.changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.changes.outputs.matrix) }}
    environment:
      name: ${{ needs.setup.outputs.env }} / ${{ matrix.target.service }}
      url: ${{ steps.deploy.outputs.service_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: sclass-${{ needs.setup.outputs.env }}-${{ matrix.target.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg MODULE=${{ matrix.target.module }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to App Runner
        id: deploy
        env:
          SERVICE_NAME: sclass-${{ needs.setup.outputs.env }}-${{ matrix.target.service }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            echo "::error::App Runner service '${SERVICE_NAME}' not found"
            exit 1
          fi

          SERVICE_URL=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${SERVICE_NAME}'].ServiceUrl" \
            --output text)

          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
          echo "Deployment triggered for ${SERVICE_NAME} (${SERVICE_ARN})"
          echo "service_url=https://${SERVICE_URL}" >> "$GITHUB_OUTPUT"
