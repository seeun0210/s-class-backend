name: CD

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Deploy target (supporters / backoffice / all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - supporters
          - backoffice

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.env.outputs.env }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release merge
        id: release
        run: |
          COMMIT_MSG=$(git log -1 --format='%s')
          if [[ "$COMMIT_MSG" =~ ^Merge\ (branch\ \'release/|tag\ \') ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch' && steps.release.outputs.is_release != 'true'
        id: filter
        with:
          filters: |
            common:
              - 'SClass-Common/**'
              - 'SClass-Domain/**'
              - 'SClass-Infrastructure/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'Dockerfile'
            supporters:
              - 'SClass-Api-Supporters/**'
            backoffice:
              - 'SClass-Api-Backoffice/**'

      - name: Build deploy matrix
        id: set-matrix
        run: |
          ALL='[{"service":"supporters-api","module":"SClass-Api-Supporters"},{"service":"backoffice-api","module":"SClass-Api-Backoffice"}]'

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.service }}" in
              all)        matrix="$ALL" ;;
              supporters) matrix='[{"service":"supporters-api","module":"SClass-Api-Supporters"}]' ;;
              backoffice) matrix='[{"service":"backoffice-api","module":"SClass-Api-Backoffice"}]' ;;
            esac
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying: $matrix"
            exit 0
          fi

          if [[ "${{ steps.release.outputs.is_release }}" == "true" ]]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
            echo "Release merge detected — deploying all services: $ALL"
            exit 0
          fi

          matrix='[]'

          if [[ "${{ steps.filter.outputs.common }}" == "true" || "${{ steps.filter.outputs.supporters }}" == "true" ]]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "supporters-api", "module": "SClass-Api-Supporters"}]')
          fi

          if [[ "${{ steps.filter.outputs.common }}" == "true" || "${{ steps.filter.outputs.backoffice }}" == "true" ]]; then
            matrix=$(echo "$matrix" | jq -c '. + [{"service": "backoffice-api", "module": "SClass-Api-Backoffice"}]')
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Deploy targets: $matrix"

  ci:
    name: CI
    needs: changes
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy ${{ matrix.target.service }} (${{ needs.setup.outputs.env }})
    needs: [setup, changes, ci]
    if: needs.changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.changes.outputs.matrix) }}
    environment:
      name: ${{ needs.setup.outputs.env }} / ${{ matrix.target.service }}
      url: ${{ steps.deploy.outputs.service_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: sclass-${{ needs.setup.outputs.env }}-${{ matrix.target.service }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg MODULE=${{ matrix.target.module }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ── Prod: ECS force new deployment ──
      - name: Deploy to ECS (prod)
        if: needs.setup.outputs.env == 'prod'
        id: deploy-ecs
        env:
          CLUSTER: sclass-prod
          SERVICE_NAME: sclass-prod-${{ matrix.target.service }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE_NAME" \
            --force-new-deployment \
            --no-cli-pager

          echo "ECS deployment triggered for $SERVICE_NAME"
          echo "service_url=https://${{ matrix.target.service }}.sclass.click" >> "$GITHUB_OUTPUT"

      # ── Dev: EC2 docker compose via SSM ──
      - name: Deploy to EC2 (dev)
        if: needs.setup.outputs.env == 'dev'
        id: deploy-ec2
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO_SUPPORTERS: sclass-dev-supporters-api
          ECR_REPO_BACKOFFICE: sclass-dev-backoffice-api
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=sclass-dev-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "::error::Dev EC2 instance not found"
            exit 1
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"cd /home/ec2-user/app && sed -i '/^ECR_URL_/d' .env && echo 'ECR_URL_SUPPORTERS=${ECR_REGISTRY}/${ECR_REPO_SUPPORTERS}' >> .env && echo 'ECR_URL_BACKOFFICE=${ECR_REGISTRY}/${ECR_REPO_BACKOFFICE}' >> .env && docker compose pull && docker compose up -d\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            2>/dev/null || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Dev deployment completed via SSM"
          echo "service_url=https://${{ matrix.target.service }}.dev.sclass.click" >> "$GITHUB_OUTPUT"

      - name: Set deploy output
        id: deploy
        run: |
          if [ -n "${{ steps.deploy-ecs.outputs.service_url }}" ]; then
            echo "service_url=${{ steps.deploy-ecs.outputs.service_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "service_url=${{ steps.deploy-ec2.outputs.service_url }}" >> "$GITHUB_OUTPUT"
          fi
